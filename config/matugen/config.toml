[config]
version_check = false

[config.wallpaper]
set = true
command = "swww img '{{ image }}' --transition-type any --transition-step 255 --transition-fps 60 --transition-duration 1.8"

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/themes/matugen.conf'
post_hook = 'kitten themes --reload-in=all matugen'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors/matugen.rasi'

[templates.swaync]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/swaync/colors/matugen.css'
post_hook = 'swaync-client -rs'

[templates.swayosd]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/swayosd/colors/matugen.css'
post_hook = 'pkill swayosd-server;setsid -f swayosd-server >/dev/null 2>&1'

[templates.niri]
input_path = '~/.config/matugen/templates/colors.kdl'
output_path = '~/.config/niri/colors.kdl'
post_hook = 'niri msg action load-config-file'

[templates.quickshell]
input_path = '~/.config/matugen/templates/quickshell.qml'
output_path = '~/.config/quickshell/color/Matugen.qml'

[templates.wlogout]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/wlogout/colors/matugen.css'
